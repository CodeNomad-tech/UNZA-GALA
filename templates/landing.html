<!-- templates/landing.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graduation Gala 2025/2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body {
            background-image: url("{{ url_for('static', filename='images/mine.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Animation for the welcome text */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-text {
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
            margin-top: 30vh;
            padding-top: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: fadeInUp 2s ease-in-out;
            position: relative;
            z-index: 1;
        }

        /* Animation for the start button */
        @keyframes start-button {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulse animation for the button */
        @keyframes buttonPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            }
        }

        .start-button {
            display: block;
            margin: 40px auto;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            animation: start-button 0.8s ease-in-out, buttonPulse 2s ease-in-out infinite 0.8s;
        }

        .start-button:hover {
            background-color: #45a049;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #03141a 0%, #051924 100%);
            color: #d2e7f7;
            margin-top: 40vh;
            font-size: 0.95em;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        footer p {
            margin: 8px 0;
        }

        footer p:first-child {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        footer a {
            color: #1a3a52;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="logo-container-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="UNZA Logo" class="logo">
    </div>
    <div class="logo-container-right">
        <img src="{{ url_for('static', filename='images/ucs-logo.jpg') }}" alt="UCS Logo" class="logo">
    </div>
    <div class="welcome-text">Welcome to the Graduation Gala 2025/2026</div>
    <button class="start-button" onclick="window.location.href='{{ url_for('constitution') }}'">Enter</button>
    <footer>
        <p>©2025/2026 Graduation Gala.</p>
        <p>Reserved Rights</p>
        <p><a href="#">--JJ.SAKALA</a></p>
    </footer>
</body>

</html>
