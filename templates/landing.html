<!-- templates/landing.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graduation Gala 2025/2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            background-image: url("{{ url_for('static', filename='images/mine.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        /* Animation for the welcome text */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-text {
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
            margin-top: 35vh;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: fadeInUp 2s ease-in-out;
        }

        .start-button {
            display: block;
            margin: 40px auto;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .start-button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="logo-container-left">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="UNZA Logo" class="logo">
    </div>
    <div class="logo-container-right">
        <img src="{{ url_for('static', filename='images/ucs-logo.jpg') }}" alt="UCS Logo" class="logo">
    </div>
    <div class="welcome-text">Welcome to the Graduation Gala 2025/2026</div>
    <button class="start-button" onclick="window.location.href='{{ url_for('constitution') }}'">Enter</button>
</body>

</html>
