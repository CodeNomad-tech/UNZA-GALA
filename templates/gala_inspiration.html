<!-- templates/gala_inspiration.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gala Inspiration - Graduation Gala 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .motivation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            margin: 40px 20px;
            text-align: center;
        }

        .motivation-text {
            font-size: 2em;
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            margin: 20px 0;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out forwards;
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .motivation-text:nth-child(1) {
            animation-delay: 0.5s;
        }

        .motivation-text:nth-child(2) {
            animation-delay: 2s;
            font-size: 1.8em;
            color: #8892B0;
        }

        .motivation-text:nth-child(3) {
            animation-delay: 3.5s;
            font-size: 2em;
            color: var(--accent-color);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .inspiration-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            margin: 40px auto;
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 5s;
            opacity: 0;
        }

        .photos-header {
            opacity: 0;
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 6s;
        }

        .gala-photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 20px;
            padding: 0 20px;
        }

        .gala-photo-card {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
        }

        .gala-photo-card:nth-child(1) {
            animation-delay: 6.5s;
        }

        .gala-photo-card:nth-child(2) {
            animation-delay: 7s;
        }

        .gala-photo-card:nth-child(3) {
            animation-delay: 7.5s;
        }

        .gala-photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 48px rgba(255, 215, 0, 0.2);
        }

        .gala-photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .end-section {
            margin-top: 60px;
            padding: 40px 20px;
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 8s;
        }

        .end-advertisement {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
        }

        .end-advertisement h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h2 class="section-title">Graduation Gala Inspiration</h2>
    </header>

    <main>
        <div class="motivation-container">
            <p class="motivation-text">✨ This moment is yours to celebrate ✨</p>
            <p class="motivation-text">Join us for an unforgettable evening of elegance and pride</p>
            <p class="motivation-text">Create memories that will last a lifetime</p>
        </div>

        <div class="inspiration-divider"></div>

        <h3 class="photos-header">Moments from Previous Galas</h3>

        <div class="gala-photos-grid">
            <div class="gala-photo-card">
                <img src="{{ url_for('static', filename='images/gala 0.jpg') }}" alt="Gala Photo 1" />
            </div>
            <div class="gala-photo-card">
                <img src="{{ url_for('static', filename='images/gala 2.jpg') }}" alt="Gala Photo 2" />
            </div>
            <div class="gala-photo-card">
                <img src="{{ url_for('static', filename='images/gala 3.jpg') }}" alt="Gala Photo 3" />
            </div>
        </div>

        <div class="end-section">
            <div class="end-advertisement">
                <h3>Ready to be part of the magic?</h3>
                <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
            </div>
        </div>
    </main>

    <footer>
        <p>©2025/2026 Graduation Gala. Reserved Rights</p>
        <p><a href="#">--JJ.SAKALA</a></p>
    </footer>
</body>

</html>
